# ==============================================================================
# ClientFlow AI — Docker Compose
# ==============================================================================
# Services:
#   - PostgreSQL 17   → port 5432 (two databases: clientflow + n8n)
#   - Adminer         → port 8080 (DB visualization UI)
#   - n8n             → port 5678 (workflow automation engine)
# ==============================================================================
# Usage:
#   docker compose up -d          Start all services
#   docker compose down           Stop all services
#   docker compose logs -f        Follow logs
#   docker compose ps             Check status
# ==============================================================================

services:
  # ============================================================================
  # PostgreSQL 17 — Primary Database Server
  # ============================================================================
  # Hosts TWO databases:
  #   1. 'clientflow' — FastAPI application data (clients, workflows, etc.)
  #   2. 'n8n'        — n8n workflow engine internal data
  # ============================================================================
  postgres:
    image: postgres:17
    container_name: clientflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - clientflow-network

  # ============================================================================
  # Adminer — Database Visualization UI
  # ============================================================================
  # Access at: http://localhost:8080
  # Login:
  #   System:   PostgreSQL
  #   Server:   postgres  (Docker service name)
  #   Username: (from POSTGRES_USER)
  #   Password: (from POSTGRES_PASSWORD)
  #   Database: clientflow  OR  n8n
  # ============================================================================
  adminer:
    image: adminer:latest
    container_name: clientflow-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - clientflow-network

  # ============================================================================
  # n8n — Workflow Automation Engine
  # ============================================================================
  # Access at: http://localhost:5678
  # Uses the 'n8n' database in the same PostgreSQL server.
  # Google Workspace & Slack credentials are configured in n8n's UI.
  # ============================================================================
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: clientflow-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=clientflow-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${N8N_DB_NAME}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Kolkata
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - clientflow-network

# ==============================================================================
# Persistent Volumes
# ==============================================================================
volumes:
  postgres_data:
    name: clientflow-postgres-data
  n8n_data:
    name: clientflow-n8n-data

# ==============================================================================
# Network
# ==============================================================================
networks:
  clientflow-network:
    name: clientflow-network
    driver: bridge
